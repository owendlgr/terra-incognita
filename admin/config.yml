backend:
  name: github
  repo: owendlgr/terra-incognita
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - label: "Topic"
        name: "topic"
        widget: "select"
        options:
          - { label: "World", value: "world" }
          - { label: "Middle East", value: "middleeast" }
          - { label: "America", value: "america" }
          - { label: "Europe", value: "europe" }
          - { label: "Travel", value: "travel" }
          - { label: "Tech", value: "tech" }
      - { label: "Kicker", name: "kicker", widget: "string", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Cover Image", name: "cover_image", widget: "image", required: false }
      - { label: "Cover Image Caption", name: "cover_caption", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Reading Time (mins)", name: "read_time", widget: "number", required: false }

  - name: "gallery"
    label: "Gallery Photos"
    folder: "content/gallery"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string" }
      - { label: "Location", name: "location", widget: "string", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Portrait", value: "portrait" }
          - { label: "Documentary", value: "documentary" }
          - { label: "Landscape", value: "landscape" }
          - { label: "Map", value: "map" }
          - { label: "Street", value: "street" }
      - { label: "Article Reference", name: "article_ref", widget: "string", required: false }
